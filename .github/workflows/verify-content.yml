name: Verify developer matrix

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Verify human and machine-readable entry points
        shell: bash
        run: |
          set -euo pipefail
          test -s README.md
          test -s README_EN.md
          test -s llms.txt
          test -s llms-full.txt
          grep -Fq 'https://www.aifast.club/' README.md
          grep -Fq 'https://gitee.com/kkwwww4444' README.md
          grep -Fq 'https://docs.aifast.club/model-check/' README.md
          grep -Fq 'https://docs.aifast.club/guides/model-check-report-guide/' README.md
          ! grep -Fq 'openai-compatible-api-check' README.md
          grep -Fq 'AI-API-Stability-Tracker' README.md
          grep -Fq 'https://docs.aifast.club/model-check/' llms-full.txt
